name:  Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: 
      - "Basic Build"
    types:
      - completed
  
jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: bp
          path: ./artifact

     
