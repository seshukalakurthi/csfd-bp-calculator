name: OWASP Dependency-Check

on:
  workflow_dispatch:

  
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    outputs:
      pages-artifact-path: ${{ steps.prepare.outputs.site_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: ${{ runner.os }}-dependency-check
          restore-keys: |
            ${{ runner.os }}-dependency-check

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "BPCalculator"
          path: "."
          format: "HTML,JSON,XML"   # generate multiple formats
          out: "dependency-check-report"

      - name: Prepare pages folder
        id: prepare
        run: |
          mkdir -p site
          # copy HTML report as index.html for Pages
          cp -v dependency-check-report/dependency-check-report.html site/index.html
          # include JSON and XML for deeper analysis
          cp -v dependency-check-report/dependency-check-report.json site/dependency-check-report.json || true
          cp -v dependency-check-report/dependency-check-report.xml site/dependency-check-report.xml || true
          echo "site_path=site" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: dependency-check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print published site URL
        run: echo "Pages site published at: ${{ steps.deploy.outputs.page_url }}"
