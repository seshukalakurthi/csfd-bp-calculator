name: OWASP Dependency-Check (publish report)

# manual trigger kept
on: workflow_dispatch

# grant Pages write permission so the deploy action can publish
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    outputs:
      pages-artifact-path: ${{ steps.prepare.outputs.site_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: ${{ runner.os }}-dependency-check
          restore-keys: |
            ${{ runner.os }}-dependency-check

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "BPCalculator"
          path: "."
          format: "HTML"
          out: "dependency-check-report"

      # Prepare a directory that will become the Pages site root
      - name: Prepare pages folder
        id: prepare
        run: |
          mkdir -p site
          # copy the generated report and give it a friendly name/index
          # if your report path differs, adjust below
          cp -v dependency-check-report/dependency-check-report.html site/index.html
          echo "site_path=site" >> "$GITHUB_OUTPUT"

      # Upload the folder as a Pages artifact (used by the deploy job)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: dependency-check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # This action consumes the special artifact uploaded above and deploys it to Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print published site URL
        run: |
          echo "Pages site published at: ${{ steps.deploy.outputs.page_url }}"
